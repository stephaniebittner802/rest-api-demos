<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple OpenAI API Demo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="card">
        <h1>OpenAI API Demo</h1>
        <p>Type a prompt and send it to the API.</p>

        <textarea id="prompt" placeholder="Ask something simple..."></textarea>
        <button id="sendBtn">Send</button>
        <button id="deleteBtn">Delete Last Response</button>

        <div id="output">Response will appear here.</div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
